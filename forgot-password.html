<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
      rel="stylesheet">
   <link rel="stylesheet" href="css/style.css">
   <title>Forgot password</title>
</head>

<body class="forgot-page">

   <section class="auth auth--forgot">

      <header class="auth__header header">
         <div class="header__container">
            <div class="header__row">
               <a href="index.html" class="header__logo">
                  <span class="header__logo-icon">
                     <img src="img/icons/Logo.svg" alt="FitTrack logo">
                  </span>
                  <span class="header__logo-title">FitTrack</span>
               </a>

               <div class="header__actions">
                  <a href="login.html" class="header__back" aria-label="Back">
                     <span class="header__back-icon">
                        <img src="img/icons/arrow-back-icon.svg" alt="">
                     </span>
                     <span class="header__back-text">Back</span>
                  </a>
               </div>
            </div>
         </div>
      </header>

      <div class="auth__container">
         <div class="auth__forgot forgot-auth">
            <div class="forgot-auth__head">
               <h1 class="forgot-auth__title">Forgot Password</h1>
               <p class="forgot-auth__subtitle">
                  Enter your email address and we’ll send<br>
                  you a link to reset your password.
               </p>
            </div>

            <div class="forgot-auth__card forgot-card">
               <div class="forgot-card__icon">
                  <img src="img/reset-password/mail.svg" alt="Forgot password">
               </div>

               <div class="forgot-card__message" id="forgotMessage"></div>

               <form action="#" class="forgot-card__form" id="forgotPasswordForm">
                  <div class="forgot-card__field field">
                     <div class="field__control">
                        <span class="field__icon">
                           <img src="img/icons/gmail-form_icon.svg" alt="">
                        </span>
                        <input id="forgot-email" name="email" type="email" class="field__input"
                           placeholder="Gosling@gmail.com" required>
                     </div>
                  </div>

                  <button type="submit" class="forgot-card__submit button button--primary">
                     Send Reset Link
                  </button>

                  <a href="login.html" class="forgot-card__back-link">Back to Sign In</a>
               </form>
            </div>
         </div>
      </div>

   </section>


   <script src="./js/config/config.js"></script>
   <script src="./js/config/api.js"></script>
   <script src="./js/auth/forgot-password.js"></script>
</body>

</html>

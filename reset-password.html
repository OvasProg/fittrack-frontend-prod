<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
      rel="stylesheet">
   <link rel="stylesheet" href="css/style.css">
   <title>Reset password</title>
</head>

<body class="reset-password-page">
   <section class="auth">
      <header class="auth__header header">
         <div class="header__container">
            <div class="header__row">
               <a href="index.html" class="header__logo">
                  <span class="header__logo-icon">
                     <img src="img/icons/Logo.svg" alt="FitTrack logo">
                  </span>
                  <span class="header__logo-title">FitTrack</span>
               </a>

               <div class="header__actions">
                  <a href="login.html" class="header__back" aria-label="Back">
                     <span class="header__back-icon">
                        <img src="img/icons/arrow-back-icon.svg" alt="">
                     </span>
                     <span class="header__back-text">Back</span>
                  </a>
               </div>
            </div>
         </div>
      </header>

      <div class="auth__container">
         <div class="reset-password">
            <div class="reset-password__head">
               <h1 class="reset-password__title">Reset Your Password</h1>
               <p class="reset-password__subtitle">Enter your new password.</p>
            </div>

            <div class="reset-password__card reset-password-card">
               <div class="reset-password-card__icon">
                  <img src="img/reset-password/mail.svg" alt="Reset password">
               </div>

               <div class="reset-password-card__message" id="resetPasswordMessage"></div>

               <form action="#" class="reset-password-card__form" id="resetPasswordForm">
                  <div class="reset-password-card__field field">
                     <div class="field__control">
                        <span class="field__icon">
                           <img src="img/icons/password_icon.svg" alt="">
                        </span>
                        <input id="new-password" name="password" type="password" class="field__input"
                           placeholder="New password" required>
                     </div>
                  </div>

                  <div class="reset-password-card__field field">
                     <div class="field__control">
                        <span class="field__icon">
                           <img src="img/icons/password_icon.svg" alt="">
                        </span>
                        <input id="confirm-password" name="password_confirmation" type="password" class="field__input"
                           placeholder="Confirm new password" required>
                     </div>
                  </div>

                  <button type="submit" class="reset-password-card__submit button button--primary">
                     Reset Password
                  </button>

                  <a href="login.html" class="reset-password-card__back-link">Back to Sign In</a>
               </form>
            </div>
         </div>
      </div>
   </section>

   <script src="./js/config/config.js"></script>
   <script src="./js/config/api.js"></script>
   <script src="./js/auth/reset-password.js"></script>
</body>

</html>
